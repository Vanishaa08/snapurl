name: SnapURL CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  server-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install server dependencies
        run: |
          cd server
          npm install
          npm install --save-dev mongodb-memory-server
          
      - name: Run server tests
        run: |
          cd server
          npm test
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: snapurl_access_super_secret_2024
          JWT_REFRESH_SECRET: snapurl_refresh_super_secret_2024
          JWT_ACCESS_EXPIRY: 7d
          JWT_REFRESH_EXPIRY: 7d
          MACHINE_ID: 1
          BASE_URL: http://localhost:5000
          CLIENT_URL: http://localhost:3000
          
      - name: Check server starts
        run: |
          cd server
          node -e "try { require('./src/app'); console.log('Server module loads OK'); } catch(e) { console.error('Server module failed:', e.message); process.exit(1); }"

  client-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install client dependencies
        run: |
          cd client
          npm install
          
      - name: Build client
        run: |
          cd client
          npm run build

  lint:
    runs-on: ubuntu-latest
    needs: [server-check, client-check]
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Run linting
        run: |
          cd server
          npx eslint src/ --ext .js --max-warnings=0 || true