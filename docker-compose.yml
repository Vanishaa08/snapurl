version: '3.8'

services:
  server:
    build: ./server
    container_name: snapurl-server
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - MACHINE_ID=${MACHINE_ID}
      - BASE_URL=${BASE_URL}
      - CLIENT_URL=http://localhost
    restart: unless-stopped

  client:
    build: ./client
    container_name: snapurl-client
    restart: unless-stopped
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: snapurl-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server
      - client
    restart: unless-stopped
